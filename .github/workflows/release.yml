name: release

# Private tool: tag-triggered build that publishes the wheel + sdist as GitHub
# Release artifacts (NOT PyPI). Tag a release with `git tag vX.Y.Z && git push --tags`.
on:
  push:
    tags: ["v*"]

# Default least privilege at the top; the write scope is granted only on the
# job that needs it (below). NEVER add concurrency cancel here — a publish in
# flight must never be cancelled.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Scoped write: only this job may create the GitHub Release.
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: astral-sh/setup-uv@557e51de59eb14aaaba2ed9621916900a91d50c6 # v6.6.1
        with:
          enable-cache: true
          version: "0.9.21"

      - name: sync (dev extras, locked)
        run: uv sync --extra dev --frozen

      # Never release a red tree. Same hermetic gate as ci.yml.
      - name: pytest (hermetic only)
        env:
          CI: "1"
          DOCH1_NONINTERACTIVE: "1"
        run: uv run pytest -q

      - name: build wheel + sdist
        run: uv build  # -> dist/*.whl, dist/*.tar.gz

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          files: dist/*
          generate_release_notes: true
